name: FinShield Enterprise CI Pipeline

# Trigger this pipeline on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the code from the GitHub repository onto the runner server
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Set up an isolated production Python runtime environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Cache dependencies to speed up subsequent pipeline runs
    - name: Cache Pip Packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Step 4: Clean install enterprise requirements
    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 5: Force generate the synthetic data assets in the pipeline context
    - name: Run Data Generator Pipeline
      run: python app/models/generate_data.py

    # Step 6: Force train the AI Random Forest architecture inside the cloud pipeline
    - name: Execute Machine Learning Training Pipeline
      run: python app/models/train_model.py

    # Step 7: Run automated software unit tests against the live trained model assets
    - name: Run Automated PyTest Suite
      run: pytest